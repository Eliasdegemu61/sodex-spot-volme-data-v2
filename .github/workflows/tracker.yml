name: Sodex Rolling 10k Tracker

on:
  schedule:
    - cron: '0 0 * * *' # Safety restart once a day
  workflow_dispatch:      # Manual trigger
  repository_dispatch:    # The "Loop" trigger
    types: [start-next-batch]

# IMPORTANT: This ensures only ONE batch runs at a time.
concurrency:
  group: sodex-sync
  cancel-in-progress: false 

jobs:
  run-batch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git pull/rebase to work

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Tracker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python -u main.py

      - name: Sync and Push Results
        run: |
          git config --global user.name "SodexBot"
          git config --global user.email "bot@sodex.dev"
          
          # 1. Stash changes to clean the working directory for pull
          git stash
          
          # 2. Pull latest data from the repo
          git pull origin main --rebase
          
          # 3. Apply your new data back
          git stash pop || echo "No changes to apply"
          
          # 4. Stage, commit and push
          git add spot_vol.csv pointer.txt
          
          # Use a variable to get the pointer for the commit message
          P_VAL=$(cat pointer.txt)
          git commit -m "Update Batch [Pointer: $P_VAL]" || echo "No changes to commit"
          
          git push origin main
