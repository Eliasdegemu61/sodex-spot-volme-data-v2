name: Sodex Rolling 10k Tracker

on:
  schedule:
    - cron: '*/30 * * * *' # Runs EVERY 30 MINUTES
  workflow_dispatch:

jobs:
  run-batch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Tracker
        run: python -u main.py

      - name: Push Results
        run: |
          git config --global user.name "SodexBot"
          git config --global user.email "bot@sodex.dev"
          git add spot_vol.csv pointer.txt # Added pointer.txt to tracking
          git commit -m "Update Batch [Pointer: $(cat pointer.txt)]" || echo "No changes"
          git push
