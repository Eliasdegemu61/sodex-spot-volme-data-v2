name: Sodex Rolling 10k Tracker

on:
  schedule:
    - cron: '0 0 * * *' # Safety restart once a day
  workflow_dispatch:      # Manual trigger
  repository_dispatch:    # The loop trigger
    types: [start-next-batch]

concurrency:
  group: sodex-sync
  cancel-in-progress: false 

jobs:
  run-batch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Tracker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python -u main.py

      - name: Sync and Push Results
        run: |
          git config --global user.name "SodexBot"
          git config --global user.email "bot@sodex.dev"
          
          # 1. Stage changes first to allow rebase
          git add spot_vol.csv pointer.txt
          
          # 2. Pull latest from origin with rebase
          git pull origin main --rebase
          
          # 3. Commit (if there are changes)
          P_VAL=$(cat pointer.txt)
          git commit -m "Update Batch [Pointer: $P_VAL]" || echo "No changes to commit"
          
          # 4. Push back to GitHub
          git push origin main
