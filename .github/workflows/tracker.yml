name: Sodex Rolling 10k Tracker

on:
  schedule:
    - cron: '0 0 * * *' # Daily safety restart
  workflow_dispatch:      # Manual start
  repository_dispatch:    # The "Loop" trigger
    types: [start-next-batch]

concurrency:
  group: sodex-sync
  cancel-in-progress: false 

jobs:
  run-batch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Tracker
        # We pass the GITHUB_TOKEN so the script can trigger the next run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python -u main.py

      - name: Sync and Push Results
        run: |
          git config --global user.name "SodexBot"
          git config --global user.email "bot@sodex.dev"
          git pull origin main --rebase
          git add spot_vol.csv pointer.txt
          P_VAL=$(cat pointer.txt)
          git commit -m "Update Batch [Pointer: $P_VAL]" || echo "No changes"
          git push origin main
